# Reverse proxy para Mira Delivery (rodando no Docker, porta 82)
# Instalar em: /etc/nginx/conf.d/miradelivery.conf
# Requer: Nginx no host (fora do Docker), Docker com frontend na porta 82

# miradelivery.com.br e www.miradelivery.com.br -> localhost:82
server {
    listen 80;
    listen [::]:80;
    server_name miradelivery.com.br www.miradelivery.com.br;

    # Logs (ajuste paths se quiser)
    access_log /var/log/nginx/miradelivery_access.log;
    error_log  /var/log/nginx/miradelivery_error.log;

    # Proxy para o container do frontend (porta 82 no host)
    location / {
        proxy_pass http://127.0.0.1:82;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Keepalive (Connection ""); Cloudflare pode enviar X-Forwarded-Proto
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffer para respostas grandes
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }
}
